<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</script>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════
   § FONT FACES — D-DIN, matching index.html exactly
═══════════════════════════════════════════════════ */
@font-face {
  font-family: 'D-DIN';
  src: url('https://kieranjgreen18-cyber.github.io/ModelViewer/fonts/D-DIN.otf') format('opentype');
  font-weight: 300 400; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'D-DIN';
  src: url('https://kieranjgreen18-cyber.github.io/ModelViewer/fonts/D-DIN-Italic.otf') format('opentype');
  font-weight: 300 400; font-style: italic; font-display: swap;
}
@font-face {
  font-family: 'D-DIN';
  src: url('https://kieranjgreen18-cyber.github.io/ModelViewer/fonts/D-DIN-Bold.otf') format('opentype');
  font-weight: 700; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'D-DIN Condensed';
  src: url('https://kieranjgreen18-cyber.github.io/ModelViewer/fonts/D-DINCondensed.otf') format('opentype');
  font-weight: 100 600; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'D-DIN Condensed';
  src: url('https://kieranjgreen18-cyber.github.io/ModelViewer/fonts/D-DINCondensed-Bold.otf') format('opentype');
  font-weight: 700; font-style: normal; font-display: swap;
}

/* ═══════════════════════════════════════════════════
   § DESIGN TOKENS — pulled from index.html
═══════════════════════════════════════════════════ */
:root {
  /* Studio background (changes with swatch) */
  --studio-bg:   #f5f5f3;

  /* UI surface — adapts light/dark based on studio bg */
  --ui-bg:       rgba(255,255,255,0.90);
  --ui-border:   rgba(0,0,0,0.07);
  --ui-text:     #080909;
  --ui-muted:    #6a7e80;
  --ui-micro:    rgba(0,0,0,0.38);

  /* Accent — pulled straight from index */
  --c-accent:    #5ba0a4;
  --c-accent-hi: #7ec8cc;

  /* Typographic system from index */
  --f-body:      'D-DIN', 'SF Pro Display', -apple-system, 'Helvetica Neue', sans-serif;
  --f-meta:      'D-DIN Condensed', 'SF Pro Display', -apple-system, sans-serif;

  /* Spacing (8px base — index scale) */
  --s-1:  8px;
  --s-2: 16px;
  --s-3: 24px;

  /* Letter spacing — from index */
  --ls-stencil: 0.20em;
  --ls-wide:    0.26em;
  --ls-open:    0.01em;

  /* Easing */
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --dur-fast: 0.22s;
  --dur-mid:  0.40s;
}

/* ── Dark-bg UI mode (auto-set by JS) */
.ui-dark {
  --ui-bg:     rgba(14,16,16,0.92);
  --ui-border: rgba(255,255,255,0.09);
  --ui-text:   #edeeed;
  --ui-muted:  #96a8aa;
  --ui-micro:  rgba(255,255,255,0.32);
}

/* ═══════════════════════════════════════════════════
   § RESET
═══════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--studio-bg);
  font-family: var(--f-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ═══════════════════════════════════════════════════
   § VIEWER
═══════════════════════════════════════════════════ */
#viewer-wrap {
  position: fixed; inset: 0;
  transition: background 0.6s var(--ease);
}

model-viewer {
  width: 100%; height: 100%;
  background: transparent;
  --progress-bar-color: var(--c-accent);
  --progress-bar-height: 1px;
  --poster-color: transparent;
}
model-viewer::part(default-progress-bar) {
  background: var(--c-accent);
  height: 1px;
  opacity: 0.5;
}

#studio-floor {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 40%;
  pointer-events: none; z-index: 1;
  background: linear-gradient(to top, rgba(0,0,0,0.035) 0%, transparent 100%);
}

/* ═══════════════════════════════════════════════════
   § DROP OVERLAY
═══════════════════════════════════════════════════ */
#drop-overlay {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  background: transparent;
  pointer-events: none; opacity: 0;
  transition: opacity 0.2s;
}
#drop-overlay.active {
  opacity: 1;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(6px);
  pointer-events: all;
}
#drop-ring {
  width: 136px; height: 136px; border-radius: 50%;
  border: 1px dashed rgba(0,0,0,0.28);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px;
}
#drop-ring svg { opacity: 0.35; }
#drop-ring span {
  font-family: var(--f-meta); font-size: 10px;
  letter-spacing: var(--ls-stencil); text-transform: uppercase;
  color: rgba(0,0,0,0.38); font-weight: 700;
}

/* ═══════════════════════════════════════════════════
   § EMPTY STATE
═══════════════════════════════════════════════════ */
#empty-state {
  position: fixed; inset: 0; z-index: 5;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
  pointer-events: none; transition: opacity 0.4s;
}
#empty-state.hidden { opacity: 0; pointer-events: none; }

.empty-icon {
  width: 68px; height: 68px;
  border: 1px solid rgba(0,0,0,0.10); border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
}
.empty-icon svg { opacity: 0.22; }

.empty-title {
  font-family: var(--f-meta); font-size: 13px; font-weight: 700;
  letter-spacing: var(--ls-stencil); text-transform: uppercase;
  color: rgba(0,0,0,0.32); text-align: center;
}
.empty-sub {
  font-family: var(--f-body); font-size: 12px;
  color: rgba(0,0,0,0.20); letter-spacing: var(--ls-open);
  text-align: center; line-height: 1.7;
}
.empty-btn {
  pointer-events: all; margin-top: 4px; padding: 9px 22px;
  background: rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.08);
  border-radius: 8px;
  font-family: var(--f-meta); font-size: 11px; font-weight: 700;
  letter-spacing: var(--ls-stencil); text-transform: uppercase;
  color: rgba(0,0,0,0.42); cursor: pointer;
  transition: background var(--dur-fast), color var(--dur-fast), border-color var(--dur-fast);
}
.empty-btn:hover {
  background: rgba(91,160,164,0.10);
  border-color: rgba(91,160,164,0.35);
  color: var(--c-accent);
}

/* ═══════════════════════════════════════════════════
   § CONTROL PANEL — single squircle, tabs above model colour
═══════════════════════════════════════════════════ */
#panel {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  background: var(--ui-bg);
  border: 1px solid var(--ui-border);
  border-radius: 16px;
  overflow: hidden;
  backdrop-filter: blur(24px) saturate(1.5);
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  box-shadow: 0 4px 32px rgba(0,0,0,0.10), 0 1px 6px rgba(0,0,0,0.06);
  transition: opacity var(--dur-mid) var(--ease),
              transform var(--dur-mid) var(--ease);
  max-width: calc(100vw - 24px);
}
#panel.hidden {
  opacity: 0;
  transform: translateX(-50%) translateY(10px);
  pointer-events: none;
}

/* ── Switcher tabs section — sits at top of panel when 2+ models ── */
#switcher-section {
  display: none; /* hidden until 2+ models */
  align-items: center;
  gap: 3px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--ui-border);
  flex-wrap: wrap;
  justify-content: flex-start;
  min-height: 40px;
}
#switcher-section.visible {
  display: flex;
}

.model-tab {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px;
  border-radius: 7px; border: none;
  background: transparent;
  font-family: var(--f-meta); font-size: 10px; font-weight: 700;
  letter-spacing: var(--ls-stencil); text-transform: uppercase;
  color: var(--ui-muted);
  cursor: pointer; white-space: nowrap;
  max-width: 150px; overflow: hidden; text-overflow: ellipsis;
  transition: background var(--dur-fast), color var(--dur-fast);
  flex-shrink: 0;
}
.model-tab:hover { background: rgba(0,0,0,0.05); color: var(--ui-text); }
.model-tab.active {
  background: rgba(91,160,164,0.12);
  color: var(--c-accent);
}

.tab-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: currentColor; opacity: 0.5;
  flex-shrink: 0; transition: opacity var(--dur-fast);
}
.model-tab.active .tab-dot { opacity: 1; }

.tab-remove {
  width: 13px; height: 13px; border-radius: 50%; border: none;
  background: transparent; color: var(--ui-micro);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 11px; line-height: 1; padding: 0; margin-left: 1px; flex-shrink: 0;
  transition: background var(--dur-fast), color var(--dur-fast);
}
.tab-remove:hover { background: rgba(0,0,0,0.08); color: var(--ui-text); }

.tab-divider {
  width: 1px; height: 16px;
  background: var(--ui-border); flex-shrink: 0; margin: 0 1px;
}

/* Add model button inside tabs section */
#tab-add {
  width: 26px; height: 26px;
  border-radius: 6px;
  border: 1px dashed rgba(0,0,0,0.16);
  background: transparent; color: var(--ui-muted);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: border-color var(--dur-fast), color var(--dur-fast), background var(--dur-fast);
}
#tab-add:hover {
  border-color: var(--c-accent);
  color: var(--c-accent);
  background: rgba(91,160,164,0.07);
}

/* ── Main controls row ── */
#controls-row {
  display: flex; align-items: center; gap: 5px;
  padding: 8px 10px;
}

/* Divider between control groups */
.panel-divider {
  width: 1px; height: 20px;
  background: var(--ui-border); flex-shrink: 0; margin: 0 3px;
}

/* Section label — D-DIN Condensed, stencil tracking, accent colour */
.panel-label {
  font-family: var(--f-meta); font-size: 9px; font-weight: 700;
  letter-spacing: var(--ls-stencil); text-transform: uppercase;
  color: var(--ui-muted); padding: 0 3px; flex-shrink: 0;
}

/* Swatch row */
.swatch-row { display: flex; align-items: center; gap: 5px; }

.swatch {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid transparent; cursor: pointer; flex-shrink: 0;
  transition: transform 0.15s, border-color 0.15s; position: relative;
}
.swatch:hover { transform: scale(1.18); }
.swatch.active {
  border-color: rgba(91,160,164,0.55);
  transform: scale(1.10);
}
.swatch.active::after {
  content: ''; position: absolute; inset: -3px; border-radius: 50%;
  border: 1px solid rgba(91,160,164,0.22);
}

.swatch-custom {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px dashed rgba(0,0,0,0.18); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex-shrink: 0;
  transition: border-color 0.15s;
}
.swatch-custom:hover { border-color: var(--c-accent); }
.swatch-custom input[type="color"] {
  opacity: 0; position: absolute; width: 20px; height: 20px; cursor: pointer;
}
.swatch-custom svg { pointer-events: none; }

/* Icon button */
.icon-btn {
  width: 30px; height: 30px; border: none; border-radius: 7px;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ui-muted);
  transition: background var(--dur-fast), color var(--dur-fast);
  flex-shrink: 0;
}
.icon-btn:hover { background: rgba(0,0,0,0.05); color: var(--ui-text); }
.icon-btn.active {
  background: rgba(91,160,164,0.12);
  color: var(--c-accent);
}

/* ═══════════════════════════════════════════════════
   § MODEL NAME BADGE (top centre)
═══════════════════════════════════════════════════ */
#model-badge {
  position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
  z-index: 20;
  background: var(--ui-bg);
  border: 1px solid var(--ui-border);
  border-radius: 20px;
  padding: 4px 14px;
  font-family: var(--f-meta); font-size: 10px; font-weight: 700;
  letter-spacing: var(--ls-stencil); text-transform: uppercase;
  color: var(--ui-muted);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  transition: opacity var(--dur-mid);
  white-space: nowrap; max-width: 280px;
  overflow: hidden; text-overflow: ellipsis;
}
#model-badge.hidden { opacity: 0; }

/* ═══════════════════════════════════════════════════
   § DRAG HINT
═══════════════════════════════════════════════════ */
#drag-hint {
  position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
  z-index: 10;
  font-family: var(--f-meta); font-size: 9px; font-weight: 700;
  letter-spacing: var(--ls-stencil); text-transform: uppercase;
  color: rgba(0,0,0,0.18);
  display: flex; align-items: center; gap: 10px;
  pointer-events: none; transition: opacity 0.8s;
}
#drag-hint.hidden { opacity: 0; }
.hint-line { width: 22px; height: 1px; background: rgba(0,0,0,0.13); }
.rotate-icon { animation: spinSlow 8s linear infinite; }
@keyframes spinSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════════════════
   § FILE INPUTS (hidden)
═══════════════════════════════════════════════════ */
#file-input       { display: none; }
#file-input-tray  { display: none; }

/* ═══════════════════════════════════════════════════
   § MOBILE — two rows at ≤600px
═══════════════════════════════════════════════════ */
@media (max-width: 600px) {
  /* Panel becomes a two-row layout */
  #controls-row {
    flex-wrap: wrap;
    gap: 4px;
    padding: 7px 8px;
    justify-content: center;
  }

  /* Force second-row break after Model section */
  .mobile-break {
    flex-basis: 100%;
    height: 0;
    border-top: 1px solid var(--ui-border);
    margin: 3px -8px 3px;
    width: calc(100% + 16px);
  }

  .swatch { width: 18px; height: 18px; }
  .swatch-custom { width: 18px; height: 18px; }
  .swatch-custom input[type="color"] { width: 18px; height: 18px; }
  .swatch-row { gap: 4px; }
  .panel-label { font-size: 8px; padding: 0 2px; }
  .icon-btn { width: 28px; height: 28px; }

  #model-badge { font-size: 9px; padding: 4px 10px; max-width: calc(100vw - 40px); }
  #panel { bottom: 18px; border-radius: 14px; }
  #drag-hint { display: none; }

  .model-tab { font-size: 9px; padding: 3px 8px; max-width: 110px; }
  #switcher-section { padding: 5px 6px; }
}

@media (max-width: 400px) {
  .swatch { width: 16px; height: 16px; }
  .swatch-custom { width: 16px; height: 16px; }
  .swatch-custom input[type="color"] { width: 16px; height: 16px; }
  .panel-divider { margin: 0 1px; }
}
</style>
</head>
<body>

<div id="viewer-wrap">
  <model-viewer
    id="mv"
    alt="3D model"
    camera-controls
    auto-rotate
    auto-rotate-delay="1000"
    rotation-per-second="4deg"
    shadow-intensity="1.4"
    shadow-softness="0.85"
    exposure="1.1"
    tone-mapping="commerce"
    skybox-image="https://modelviewer.dev/shared-assets/environments/neutral.hdr"
    interaction-prompt="none"
    loading="eager"
    ar ar-modes="webxr scene-viewer quick-look"
  ></model-viewer>
</div>

<div id="studio-floor"></div>

<!-- Empty state -->
<div id="empty-state">
  <div class="empty-icon">
    <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
      <path d="M6 22L16 8l10 14H6z" stroke="#1a1a1a" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="22" cy="10" r="3" stroke="#1a1a1a" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="empty-title">No model loaded</div>
  <div class="empty-sub">Drop one or more .glb files anywhere<br>or click to browse</div>
  <button class="empty-btn" id="browse-btn">Browse files</button>
</div>

<!-- Drop overlay -->
<div id="drop-overlay">
  <div id="drop-ring">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <path d="M14 6v12M9 11l5-5 5 5" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M5 20h18" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span>Drop to add</span>
  </div>
</div>

<!-- Model name badge -->
<div id="model-badge" class="hidden">—</div>

<!-- Drag hint -->
<div id="drag-hint" class="hidden">
  <div class="hint-line"></div>
  <svg class="rotate-icon" width="13" height="13" viewBox="0 0 14 14" fill="none">
    <path d="M2 7a5 5 0 1 0 5-5" stroke="rgba(0,0,0,0.28)" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M7 2L5 4l2 2" stroke="rgba(0,0,0,0.28)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  Drag to rotate
  <div class="hint-line"></div>
</div>

<!-- Control panel — single squircle pill -->
<div id="panel" class="hidden">

  <!-- Model switcher section — hidden until 2+ models loaded -->
  <div id="switcher-section"></div>

  <!-- Main controls row -->
  <div id="controls-row">

    <!-- Open file -->
    <button class="icon-btn" id="open-btn" title="Add model">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <path d="M2 4.5A1.5 1.5 0 0 1 3.5 3H6l1.5 2H13A1.5 1.5 0 0 1 14 6.5V12A1.5 1.5 0 0 1 12.5 13.5h-9A1.5 1.5 0 0 1 2 12V4.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
    </button>

    <div class="panel-divider"></div>

    <!-- Studio background -->
    <span class="panel-label">Studio</span>
    <div class="swatch-row" id="studio-swatches">
      <div class="swatch active" data-color="#f5f5f3" style="background:#f5f5f3;" title="Warm white"></div>
      <div class="swatch" data-color="#ffffff" style="background:#ffffff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);" title="Pure white"></div>
      <div class="swatch" data-color="#e8e4e0" style="background:#e8e4e0;" title="Stone"></div>
      <div class="swatch" data-color="#080909" style="background:#080909;" title="Void"></div>
      <div class="swatch" data-color="#0d1b2a" style="background:#0d1b2a;" title="Deep navy"></div>
      <div class="swatch-custom" title="Custom studio colour">
        <input type="color" id="studio-color-custom" value="#f5f5f3">
        <svg width="9" height="9" viewBox="0 0 10 10" fill="none">
          <path d="M5 2v6M2 5h6" stroke="rgba(0,0,0,0.3)" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <div class="panel-divider"></div>

    <!-- Model colour -->
    <span class="panel-label">Model</span>
    <div class="swatch-row" id="model-swatches">
      <div class="swatch active" data-model-color="original"
           style="background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);"
           title="Original materials"></div>
      <div class="swatch" data-model-color="#e8e8e8" style="background:#e8e8e8;" title="Matte white"></div>
      <div class="swatch" data-model-color="#c0c0c0"
           style="background: linear-gradient(135deg,#d8d8d8,#a0a0a0);" title="Brushed silver"></div>
      <div class="swatch" data-model-color="#1a1a1a" style="background:#1a1a1a;" title="Matte black"></div>
      <div class="swatch" data-model-color="#1a3a5c" style="background:#1a3a5c;" title="Navy"></div>
      <div class="swatch" data-model-color="#8B2020" style="background:#8B2020;" title="Carmine"></div>
      <div class="swatch" data-model-color="#2d5a3d" style="background:#2d5a3d;" title="Forest"></div>
      <div class="swatch-custom" title="Custom model colour">
        <input type="color" id="model-color-custom" value="#e8e8e8">
        <svg width="9" height="9" viewBox="0 0 10 10" fill="none">
          <path d="M5 2v6M2 5h6" stroke="rgba(0,0,0,0.3)" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>

    <div class="panel-divider"></div>

    <!-- Lighting -->
    <span class="panel-label">Light</span>
    <button class="icon-btn active" id="light-studio" title="Studio lighting">
      <svg width="14" height="14" viewBox="0 0 15 15" fill="none">
        <circle cx="7.5" cy="7.5" r="3" stroke="currentColor" stroke-width="1.2"/>
        <path d="M7.5 1v1.5M7.5 12.5V14M1 7.5h1.5M12.5 7.5H14M3.2 3.2l1 1M10.8 10.8l1 1M10.8 3.2l-1 1M3.2 10.8l1-1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="icon-btn" id="light-dramatic" title="Dramatic lighting">
      <svg width="14" height="14" viewBox="0 0 15 15" fill="none">
        <path d="M7.5 1L9.5 6H14L10.5 8.5 12 13 7.5 10 3 13l1.5-4.5L1 6h4.5L7.5 1z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="icon-btn" id="light-outdoor" title="Outdoor lighting">
      <svg width="14" height="14" viewBox="0 0 15 15" fill="none">
        <path d="M2 10c0-3 2.5-5.5 5.5-5.5S13 7 13 10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M1 10h13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M7.5 1v1.5M3.5 2.5l1 1M11.5 2.5l-1 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="panel-divider"></div>

    <!-- Rotate toggle -->
    <button class="icon-btn active" id="rotate-btn" title="Toggle auto-rotation">
      <svg width="14" height="14" viewBox="0 0 15 15" fill="none">
        <path d="M2 7.5a5.5 5.5 0 1 0 5.5-5.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        <path d="M7.5 2L5.5 4l2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <!-- Reset camera -->
    <button class="icon-btn" id="reset-btn" title="Reset camera">
      <svg width="14" height="14" viewBox="0 0 15 15" fill="none">
        <rect x="2" y="2" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.2"/>
        <path d="M5 7.5h5M7.5 5v5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </button>

    <!-- Mobile line break — only visible via CSS on small screens -->
    <div class="mobile-break" style="display:none;" id="mobile-break"></div>

  </div>
</div>

<input type="file" id="file-input" accept=".glb,.gltf" multiple>
<input type="file" id="file-input-tray" accept=".glb,.gltf" multiple>

<script>
'use strict';

const mv            = document.getElementById('mv');
const panel         = document.getElementById('panel');
const emptyState    = document.getElementById('empty-state');
const dropOverlay   = document.getElementById('drop-overlay');
const badge         = document.getElementById('model-badge');
const dragHint      = document.getElementById('drag-hint');
const fileInput     = document.getElementById('file-input');
const fileInputTray = document.getElementById('file-input-tray');
const viewerWrap    = document.getElementById('viewer-wrap');
const studioFloor   = document.getElementById('studio-floor');
const switcherSection = document.getElementById('switcher-section');
const mobileBreak   = document.getElementById('mobile-break');

let modelList         = [];
let activeIndex       = -1;
let autoRotating      = true;
let currentModelColor = 'original';
let hintDone          = false;
let reloadingForOriginal = false;

const HDRIS = {
  studio:   'https://modelviewer.dev/shared-assets/environments/neutral.hdr',
  dramatic: 'https://modelviewer.dev/shared-assets/environments/spruit_sunrise_1k_HDR.hdr',
  outdoor:  'https://modelviewer.dev/shared-assets/environments/aircraft_workshop_01_1k.hdr',
};

// ── Mobile break visibility
function updateMobileBreak() {
  const isMobile = window.matchMedia('(max-width: 600px)').matches;
  mobileBreak.style.display = isMobile ? 'block' : 'none';
}
updateMobileBreak();
window.addEventListener('resize', updateMobileBreak);

// ── Colour helpers
function isColorDark(hex) {
  const c = hex.replace('#','');
  const r = parseInt(c.substr(0,2),16),
        g = parseInt(c.substr(2,2),16),
        b = parseInt(c.substr(4,2),16);
  return (r*299 + g*587 + b*114) / 1000 < 128;
}
function hexToRgb01(hex) {
  const c = hex.replace('#','');
  return [
    parseInt(c.substr(0,2),16)/255,
    parseInt(c.substr(2,2),16)/255,
    parseInt(c.substr(4,2),16)/255,
    1.0
  ];
}

// ── Studio background + UI token update
function setStudioColor(hex) {
  viewerWrap.style.background = hex;
  document.body.style.background = hex;
  const isDark = isColorDark(hex);

  studioFloor.style.background = isDark
    ? 'linear-gradient(to top, rgba(255,255,255,0.03) 0%, transparent 100%)'
    : 'linear-gradient(to top, rgba(0,0,0,0.035) 0%, transparent 100%)';

  // Swap UI surface tokens
  if (isDark) {
    panel.classList.add('ui-dark');
    badge.classList.add('ui-dark');
  } else {
    panel.classList.remove('ui-dark');
    badge.classList.remove('ui-dark');
  }

  // Update swatch-custom plus icon colour to match
  document.querySelectorAll('.swatch-custom svg path').forEach(p => {
    p.setAttribute('stroke', isDark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)');
  });
}

// ── Apply model material colour
async function applyModelColor(colorOrOriginal) {
  currentModelColor = colorOrOriginal;
  if (activeIndex >= 0) modelList[activeIndex].color = colorOrOriginal;

  await mv.updateComplete;
  const model = mv.model;
  if (!model?.materials?.length) return;

  if (colorOrOriginal === 'original') {
    reloadingForOriginal = true;
    const src = mv.src;
    mv.src = '';
    await new Promise(r => setTimeout(r, 40));
    mv.src = src;
    return;
  }

  const rgba = hexToRgb01(colorOrOriginal);
  const isMetal = colorOrOriginal === '#c0c0c0';
  model.materials.forEach(mat => {
    const pbr = mat.pbrMetallicRoughness;
    if (!pbr) return;
    pbr.setBaseColorFactor(rgba);
    pbr.setMetallicFactor(isMetal ? 0.85 : 0.0);
    pbr.setRoughnessFactor(isMetal ? 0.2 : colorOrOriginal === '#1a1a1a' ? 0.65 : 0.45);
  });
}

// ── Switch to model at index
function switchTo(index) {
  if (index < 0 || index >= modelList.length) return;
  activeIndex = index;
  const entry = modelList[index];

  mv.src = entry.src;
  badge.textContent = entry.name;
  badge.classList.remove('hidden');

  // Restore colour state for this model
  const col = entry.color || 'original';
  currentModelColor = col;
  document.querySelectorAll('#model-swatches .swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.modelColor === col);
  });
  const knownColors = ['original','#e8e8e8','#c0c0c0','#1a1a1a','#1a3a5c','#8B2020','#2d5a3d'];
  if (!knownColors.includes(col)) {
    document.querySelectorAll('#model-swatches .swatch').forEach(s => s.classList.remove('active'));
  }

  renderSwitcher();
}

// ── Add model
function addModel(src, name, isObjectUrl = false) {
  if (modelList.some(m => m.src === src)) return;
  modelList.push({ src, name, isObjectUrl, color: 'original' });
  switchTo(modelList.length - 1);

  panel.classList.remove('hidden');
  emptyState.classList.add('hidden');

  if (!hintDone) {
    dragHint.classList.remove('hidden');
    setTimeout(() => { if (!hintDone) { hintDone = true; dragHint.classList.add('hidden'); } }, 4000);
  }
}

// ── Remove model
function removeModel(index) {
  const entry = modelList[index];
  if (entry.isObjectUrl) URL.revokeObjectURL(entry.src);
  modelList.splice(index, 1);

  if (modelList.length === 0) {
    activeIndex = -1;
    mv.src = '';
    badge.classList.add('hidden');
    panel.classList.add('hidden');
    switcherSection.classList.remove('visible');
    switcherSection.innerHTML = '';
    emptyState.classList.remove('hidden');
    return;
  }

  switchTo(Math.min(index, modelList.length - 1));
}

// ── Render switcher tabs inside the panel
function renderSwitcher() {
  switcherSection.innerHTML = '';

  if (modelList.length < 2) {
    switcherSection.classList.remove('visible');
    return;
  }

  switcherSection.classList.add('visible');

  modelList.forEach((entry, i) => {
    const btn = document.createElement('button');
    btn.className = 'model-tab' + (i === activeIndex ? ' active' : '');
    btn.title = entry.name;

    const dot = document.createElement('span');
    dot.className = 'tab-dot';

    const label = document.createElement('span');
    label.textContent = entry.name;
    label.style.cssText = 'overflow:hidden;text-overflow:ellipsis;max-width:110px;display:block;';

    const rm = document.createElement('button');
    rm.className = 'tab-remove';
    rm.title = 'Remove';
    rm.textContent = '×';
    rm.addEventListener('click', e => { e.stopPropagation(); removeModel(i); });

    btn.appendChild(dot);
    btn.appendChild(label);
    btn.appendChild(rm);
    btn.addEventListener('click', () => switchTo(i));
    switcherSection.appendChild(btn);

    if (i < modelList.length - 1) {
      const divider = document.createElement('div');
      divider.className = 'tab-divider';
      switcherSection.appendChild(divider);
    }
  });

  // Add-model button
  const sep = document.createElement('div');
  sep.className = 'tab-divider';
  switcherSection.appendChild(sep);

  const addBtn = document.createElement('button');
  addBtn.id = 'tab-add';
  addBtn.title = 'Add model';
  addBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>`;
  addBtn.addEventListener('click', () => fileInputTray.click());
  switcherSection.appendChild(addBtn);
}

// ── Load from File
function loadFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['glb','gltf'].includes(ext)) return;
  const url = URL.createObjectURL(file);
  const name = file.name.replace(/\.(glb|gltf)$/i, '');
  addModel(url, name, true);
}

// ── File input handlers
fileInput.addEventListener('change', e => {
  Array.from(e.target.files).forEach(loadFile);
  fileInput.value = '';
});
fileInputTray.addEventListener('change', e => {
  Array.from(e.target.files).forEach(loadFile);
  fileInputTray.value = '';
});
document.getElementById('browse-btn').addEventListener('click', () => fileInput.click());
document.getElementById('open-btn').addEventListener('click', () => fileInputTray.click());

// ── Drag & drop
let dragCount = 0;
document.addEventListener('dragenter', e => {
  e.preventDefault(); dragCount++;
  dropOverlay.classList.add('active');
});
document.addEventListener('dragleave', () => {
  dragCount--;
  if (dragCount <= 0) { dragCount = 0; dropOverlay.classList.remove('active'); }
});
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault(); dragCount = 0;
  dropOverlay.classList.remove('active');
  Array.from(e.dataTransfer.files).forEach(loadFile);
});

// ── Studio swatches
document.querySelectorAll('#studio-swatches .swatch').forEach(s => {
  s.addEventListener('click', () => {
    document.querySelectorAll('#studio-swatches .swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    setStudioColor(s.dataset.color);
    document.getElementById('studio-color-custom').value = s.dataset.color;
  });
});
document.getElementById('studio-color-custom').addEventListener('input', e => {
  document.querySelectorAll('#studio-swatches .swatch').forEach(x => x.classList.remove('active'));
  setStudioColor(e.target.value);
});

// ── Model colour swatches
document.querySelectorAll('#model-swatches .swatch').forEach(s => {
  s.addEventListener('click', () => {
    document.querySelectorAll('#model-swatches .swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    applyModelColor(s.dataset.modelColor);
  });
});
document.getElementById('model-color-custom').addEventListener('input', e => {
  document.querySelectorAll('#model-swatches .swatch').forEach(x => x.classList.remove('active'));
  applyModelColor(e.target.value);
});

// ── Lighting
const LIGHT_IDS = { studio: 'light-studio', dramatic: 'light-dramatic', outdoor: 'light-outdoor' };
Object.entries(LIGHT_IDS).forEach(([env, id]) => {
  document.getElementById(id).addEventListener('click', () => {
    Object.values(LIGHT_IDS).forEach(bid => document.getElementById(bid).classList.remove('active'));
    document.getElementById(id).classList.add('active');
    mv.setAttribute('skybox-image', HDRIS[env]);
    mv.setAttribute('exposure',        env === 'dramatic' ? '0.85' : env === 'outdoor' ? '1.3' : '1.1');
    mv.setAttribute('shadow-intensity', env === 'dramatic' ? '2.0'  : env === 'outdoor' ? '1.2' : '1.4');
  });
});

// ── Rotate toggle
const rotateBtn = document.getElementById('rotate-btn');
rotateBtn.addEventListener('click', () => {
  autoRotating = !autoRotating;
  autoRotating ? mv.setAttribute('auto-rotate','') : mv.removeAttribute('auto-rotate');
  rotateBtn.classList.toggle('active', autoRotating);
});

// ── Reset camera
document.getElementById('reset-btn').addEventListener('click', () => {
  mv.cameraOrbit = 'auto auto auto';
  mv.fieldOfView = 'auto';
  mv.jumpCameraToGoal();
});

// ── Pause/resume rotation on interaction
function pauseRot()  { if (autoRotating) mv.removeAttribute('auto-rotate'); }
function resumeRot() { if (autoRotating) setTimeout(() => mv.setAttribute('auto-rotate',''), 800); }
mv.addEventListener('mousedown',  pauseRot);
mv.addEventListener('mouseup',    resumeRot);
mv.addEventListener('mouseleave', resumeRot);
mv.addEventListener('touchstart', pauseRot, { passive: true });
mv.addEventListener('touchend',   resumeRot);

// ── Dismiss drag hint on camera interaction
mv.addEventListener('camera-change', () => {
  if (!hintDone && activeIndex >= 0) { hintDone = true; dragHint.classList.add('hidden'); }
});

// ── On model load: re-apply stored colour
mv.addEventListener('load', async () => {
  await mv.updateComplete;
  mv.jumpCameraToGoal();
  if (reloadingForOriginal) {
    reloadingForOriginal = false;
    return;
  }
  if (currentModelColor !== 'original') applyModelColor(currentModelColor);
});

// ── Init
setStudioColor('#f5f5f3');

// ── Preload from config
if (typeof MODELS !== 'undefined' && MODELS.length > 0) {
  MODELS.forEach(m =>
    addModel(m.src, m.name || m.src.split('/').pop().replace(/\.(glb|gltf)$/i,''))
  );
}
</script>
</body>
</html>
